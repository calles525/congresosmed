<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Jornada de Egresados</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #667eea; margin-bottom: 5px; }
        h2 { color: #764ba2; font-size: 18px; margin-top: 0; }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .precio {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .precio ul {
            margin: 0;
            padding-left: 20px;
        }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 I Jornada de Egresados</h1>
        <h2>"Dra. Analiese Cordero"</h2>
        <p>Sábado 16 de Mayo 2026 | Club Social Canario de Acarigua</p>
        
        <div class="precio">
            <strong>💰 Inversión:</strong>
            <ul>
                <li>Bachilleres: 10€</li>
                <li>Médicos generales, residentes y enfermería: 15€</li>
                <li>Especialistas: 25€</li>
            </ul>
        </div>
        
        <form id="registroForm">
            <input type="text" id="nombreCompleto" placeholder="Nombre Completo *" required>
            <input type="text" id="cedula" placeholder="Cédula *" required>
            <input type="email" id="email" placeholder="Correo Electrónico *" required>
            <input type="tel" id="telefono" placeholder="Teléfono *" required>
            
            <select id="categoria" required>
                <option value="">Selecciona tu categoría *</option>
                <option value="bachiller">🎓 Bachiller - 10€</option>
                <option value="medico_general">👨‍⚕️ Médico General - 15€</option>
                <option value="residente_enfermeria">🏥 Residente/Enfermería - 15€</option>
                <option value="especialista">⭐ Especialista - 25€</option>
            </select>
            
            <input type="text" id="referenciaPago" placeholder="Referencia de Pago (N° de transferencia) *" required>
            <input type="number" id="montoPagado" placeholder="Monto Pagado en Bolívares *" required>
            <input type="date" id="fechaPago" required>
            
            <input type="text" id="nombreEgresado" placeholder="¿Eres egresado? (opcional)">
            <input type="text" id="anoEgreso" placeholder="Año de egreso (opcional)">
            
            <button type="submit">✅ REGISTRARME</button>
        </form>
        
        <div id="resultado"></div>
    </div>

    <script>
        const URL_WEBAPP = 'https://script.google.com/macros/s/AKfycbyOUtYSBdL4vQp8S2bEiHit1ZijA7t5N59gefdv81FkZqULrizhxfF7PMCozbb03oPrAg/exec';
        
        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const datos = {
                nombreCompleto: document.getElementById('nombreCompleto').value,
                cedula: document.getElementById('cedula').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                categoria: document.getElementById('categoria').value,
                referenciaPago: document.getElementById('referenciaPago').value,
                montoPagado: parseFloat(document.getElementById('montoPagado').value),
                fechaPago: document.getElementById('fechaPago').value,
                nombreEgresado: document.getElementById('nombreEgresado').value,
                anoEgreso: document.getElementById('anoEgreso').value,
                observaciones: ''
            };
            
            const resultadoDiv = document.getElementById('resultado');
            resultadoDiv.innerHTML = '⏳ Enviando registro...';
            resultadoDiv.className = 'info';
            
            try {
                const response = await fetch(URL_WEBAPP, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'no-cors',  // ← Cambia a no-cors
                    body: JSON.stringify(datos)
                });
                
                const respuesta = await response.json();
                
                if (respuesta.success) {
                    resultadoDiv.innerHTML = `✅ ${respuesta.message}<br>💰 Monto: ${respuesta.montoEUR} EUR<br>📧 Recibirás un correo de confirmación.<br><br>⏳ Estado: PENDIENTE DE VERIFICACIÓN`;
                    resultadoDiv.className = 'success';
                    document.getElementById('registroForm').reset();
                } else {
                    resultadoDiv.innerHTML = `❌ Error: ${respuesta.error}`;
                    resultadoDiv.className = 'error';
                }
            } catch (error) {
                resultadoDiv.innerHTML = `❌ Error de conexión: ${error.message}<br><br>Verifica que el Web App esté desplegado correctamente.`;
                resultadoDiv.className = 'error';
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
